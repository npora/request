name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Update npm
        run: npm install --global npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: |
          pnpm typecheck
          pnpm test:run
          pnpm build

      - name: Create or update release pull request
        uses: changesets/action@v1.7.0
        with:
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check published version
        id: registry
        shell: bash
        run: |
          VERSION="$(node --print "require('./package.json').version")"
          PACKAGE_NAME="$(node --print "require('./package.json').name")"
          ENCODED_NAME="$(node --print "encodeURIComponent(require('./package.json').name)")"

          STATUS="$(
            curl \
              --silent \
              --output /dev/null \
              --write-out "%{http_code}" \
              "https://registry.npmjs.org/${ENCODED_NAME}/${VERSION}"
          )"

          echo "package=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" = "200" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${VERSION} is already published."
          elif [ "$STATUS" = "404" ]; then
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${VERSION} is not published yet."
          else
            echo "Unexpected npm registry status: ${STATUS}"
            exit 1
          fi

      - name: Publish package
        if: steps.registry.outputs.published == 'false'
        run: npm publish --access public
